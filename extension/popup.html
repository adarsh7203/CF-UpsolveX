<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CF UpsolveX Settings</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #aaaaaa;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #333333;
      border-radius: 6px;
      background-color: #1e1e1e;
      color: #ffffff;
      font-size: 14px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #4a90e2;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #357abd;
    }
    .secondary-btn {
      background-color: #333333;
      margin-top: 8px;
    }
    .secondary-btn:hover {
      background-color: #444444;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #4caf50;
      display: none;
      text-align: center;
    }
    .status.error {
      color: #f44336;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #777777;
    }
    a {
      color: #4a90e2;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>CF UpsolveX</h2>
  
  <div class="form-group">
    <label for="handle">Codeforces Handle</label>
    <input type="text" id="handle" placeholder="Enter your handle">
  </div>
  
  <button id="saveBtn">Save Handle</button>
  <button id="syncBtn" class="secondary-btn">Force Sync Data</button>
  
  <div id="statusMessage" class="status"></div>
  
  <div class="footer">
    Go to <a href="https://cfupsolvex.netlify.app" target="_blank">CF UpsolveX Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
